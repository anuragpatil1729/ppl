<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Nexus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="auth-body d-flex align-items-center">
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
      <div class="glass-card p-4 p-md-5">
        <h2 class="auth-heading text-center mb-2">Welcome Back</h2>
        <p class="text-center text-white-50 mb-4">Access your dashboard securely</p>

        <p class="success-text text-center" th:if="${param.registered}">Registration successful. Please verify your email with OTP.</p>
        <p class="success-text text-center" th:if="${param.verified}">Email verified successfully. Please sign in.</p>
        <p class="success-text text-center" th:if="${param.logout}">You have been logged out.</p>
        <p class="form-text error text-center" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>

        <form th:action="@{/login}" th:object="${loginRequest}" method="post" data-auth-form>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input id="email" type="email" class="form-control" th:field="*{email}" required>
            <div class="form-text error" th:errors="*{email}"></div>
            <div class="form-text error" data-error-for="email"></div>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <input id="password" type="password" class="form-control" th:field="*{password}" required>
              <button type="button" class="btn toggle-password" data-toggle-password="password">Show</button>
            </div>
            <div class="form-text error" th:errors="*{password}"></div>
          </div>

          <button type="submit" class="btn btn-neon w-100 py-2">
            <span class="spinner-border spinner-border-sm me-2 d-none" role="status" aria-hidden="true"></span>
            Sign In
          </button>
        </form>

        <p class="text-center mt-3 mb-0">New user?
          <a th:href="@{/register}" class="text-info">Create account</a>
        </p>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/auth.js}"></script>
</body>
</html>
