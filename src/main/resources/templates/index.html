<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nexus | Premium Learning</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-neon: #00f2ff;
      --secondary-neon: #7000ff;
      --bg-dark: #0a0b10;
    }

    body {
      background: radial-gradient(circle at top right, #1a1b25, var(--bg-dark));
      color: white;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(to right, var(--primary-neon), var(--secondary-neon));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 30px;
    }

    .form-control, .form-select {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      border-radius: 12px;
      padding: 12px 15px;
    }

    .form-control:focus, .form-select:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--primary-neon);
      color: white;
      box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
    }

    label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 8px;
    }

    .btn-pay {
      background: linear-gradient(45deg, var(--secondary-neon), var(--primary-neon));
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      width: 100%;
      margin-top: 20px;
    }

    .btn-pay:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(112, 0, 255, 0.4);
    }

    /* Modern select appearance fix */
    option { background: #1a1b25; color: white; }
  </style>
</head>
<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
      <div class="glass-card">
        <div class="text-center">
          <h1>Guna's Academy</h1>
          <p class="text-white-50">Secure Enrollment Portal</p>
          <p class="text-info" th:if="${currentUserName != null}">Welcome, <span th:text="${currentUserName}"></span></p>
        </div>

        <div class="row g-3 mt-2">
          <div class="col-12">
            <label>Full Name</label>
            <input type="text" id="name" class="form-control" placeholder="Enter your name">
          </div>

          <div class="col-md-6">
            <label>Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="name@company.com">
          </div>

          <div class="col-md-6">
            <label>Phone Number</label>
            <input type="number" id="Phno" class="form-control" placeholder="+91 00000 00000">
          </div>

          <div class="col-md-8">
            <label>Select Your Path</label>
            <select class="form-select" id="course">
              <option selected disabled>Choose Course...</option>
              <option value="java">JAVA MASTERCLASS</option>
              <option value="python">PYTHON PRO</option>
              <option value="devops">DEVOPS ENGINEER</option>
            </select>
          </div>

          <div class="col-md-4">
            <label>Amount (₹)</label>
            <input type="number" id="amount" class="form-control" value="1">
          </div>

          <div class="col-12">
            <button id="rzp-button1" class="btn btn-primary btn-pay">Initialize Payment</button>
          </div>
        </div>
        
        <div class="mt-4 text-center">
          <small class="text-white-50">Secured by <strong>Razorpay</strong></small>
          <form th:if="${currentUserName != null}" th:action="@{/logout}" method="post" class="mt-3">
            <button class="btn btn-outline-info btn-sm" type="submit">Logout</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
  async function createOrder() {
    const response = await fetch('http://localhost:8080/create-order', {
      method: 'POST',
      headers: { 'content-Type': 'application/json' },
      body: JSON.stringify({
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        Phno: document.getElementById('Phno').value,
        course: document.getElementById('course').value,
        amount: document.getElementById('amount').value,
        currency: 'INR'
      })
    });
    return await response.json();
  }

  document.getElementById('rzp-button1').onclick = async function(e) {
    e.preventDefault();
    const order = await createOrder();
    
    var options = {
      "key": "rzp_test_SZmkSJNyKrpRjD", 
      "amount": order.amount,
      "currency": "INR",
      "name": "Rajkumar Marathe ",
      "description": "Enrollment for " + order.course,
      "order_id": order.razorpayOrderId,
      "callback_url": "http://localhost:8080/handle-payment-callback",
      "prefill": {
        "name": order.name,
        "email": order.email,
        "contact": order.Phno
      },
      "theme": {
        "color": "#7000ff" // Neon purple to match the new UI
      }
    };
    var rzp1 = new Razorpay(options);
    rzp1.open();
  }
</script>

</body>
</html>
