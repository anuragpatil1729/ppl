<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verify Email | Nexus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="auth-body d-flex align-items-center">
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
      <div class="glass-card p-4 p-md-5">
        <h2 class="auth-heading text-center mb-2">Verify Your Email</h2>
        <p class="text-center text-white-50 mb-4">Enter the 6-digit code sent to your email</p>

        <p class="form-text error text-center" th:if="${error}" th:text="${error}"></p>
        <p class="success-text text-center" th:if="${success}" th:text="${success}"></p>

        <form th:action="@{/verify-email}" method="post" class="mb-3">
          <div class="mb-4">
            <label for="otp" class="form-label">OTP Code</label>
            <input id="otp" name="otp" type="text" inputmode="numeric" class="form-control text-center"
                   pattern="\\d{6}" maxlength="6" minlength="6" required>
          </div>

          <button type="submit" class="btn btn-neon w-100 py-2">Verify</button>
        </form>

        <form th:action="@{/verify-email/resend}" method="post">
          <button type="submit" class="btn btn-outline-neon w-100 py-2">Resend OTP</button>
        </form>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
