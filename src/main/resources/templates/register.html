<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register | Nexus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="auth-body d-flex align-items-center">
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
      <div class="glass-card p-4 p-md-5">
        <h2 class="auth-heading text-center mb-2">Create Account</h2>
        <p class="text-center text-white-50 mb-4">Join the secure futuristic portal</p>

        <form th:action="@{/register}" th:object="${registerRequest}" method="post" data-auth-form>
          <div class="mb-3">
            <label for="fullName" class="form-label">Full Name</label>
            <input id="fullName" type="text" class="form-control" th:field="*{fullName}" minlength="3" required>
            <div class="form-text error" th:errors="*{fullName}"></div>
            <div class="form-text error" data-error-for="fullName"></div>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input id="email" type="email" class="form-control" th:field="*{email}" required>
            <div class="form-text error" th:errors="*{email}"></div>
            <div class="form-text error" data-error-for="email"></div>
          </div>

          <div class="mb-3">
            <label for="mobile" class="form-label">Mobile Number</label>
            <input id="mobile" type="text" inputmode="numeric" class="form-control" th:field="*{mobile}" pattern="\\d{10}" maxlength="10" required>
            <div class="form-text error" th:errors="*{mobile}"></div>
            <div class="form-text error" data-error-for="mobile"></div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <input id="password" type="password" class="form-control" th:field="*{password}" required>
              <button type="button" class="btn toggle-password" data-toggle-password="password">Show</button>
            </div>
            <div class="form-text error" th:errors="*{password}"></div>
            <div class="form-text error" data-error-for="password"></div>
          </div>

          <div class="mb-4">
            <label for="confirmPassword" class="form-label">Confirm Password</label>
            <div class="input-group">
              <input id="confirmPassword" type="password" class="form-control" th:field="*{confirmPassword}" required>
              <button type="button" class="btn toggle-password" data-toggle-password="confirmPassword">Show</button>
            </div>
            <div class="form-text error" th:errors="*{confirmPassword}"></div>
            <div class="form-text error" data-error-for="confirmPassword"></div>
          </div>

          <button type="submit" class="btn btn-neon w-100 py-2">
            <span class="spinner-border spinner-border-sm me-2 d-none" role="status" aria-hidden="true"></span>
            Sign Up
          </button>
        </form>

        <p class="text-center mt-3 mb-0">Already have an account?
          <a th:href="@{/login}" class="text-info">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/auth.js}"></script>
</body>
</html>
